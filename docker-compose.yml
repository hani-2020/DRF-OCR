version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: drfpractice_db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d drfpractice_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  django:
    build: ./AsyncWorker
    container_name: django
    ports:
      - "8000:8000"
    volumes:
      - ./AsyncWorker:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      elastic-search:
        condition: service_healthy
      postgres:
        condition: service_healthy

  celery:
    build: ./AsyncWorker
    container_name: celery
    volumes:
      - ./AsyncWorker:/app
    command: celery -A AsyncWorkerProject worker -l info
    depends_on:
      rabbitmq:
        condition: service_healthy
      elastic-search:
        condition: service_healthy
      postgres:
        condition: service_healthy

  elastic-search:
    image: elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  es_data:
  rabbitmq_data:
  postgres_data: