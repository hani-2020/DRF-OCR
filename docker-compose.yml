version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  django:
    build: ./AsyncWorker
    container_name: django
    ports:
      - "8000:8000"
    volumes:
      - ./AsyncWorker:/app
    depends_on:
      - rabbitmq
      
  celery:
    build: ./AsyncWorker
    container_name: celery
    volumes:
      - ./AsyncWorker:/app
    command: celery -A AsyncWorkerProject worker -l info
    depends_on:
      - rabbitmq

  elastic-search:
    image: elasticsearch:7.17.10
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"


volumes:
  rabbitmq_data: